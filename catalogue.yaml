- name: configure catalogue
  hosts: catalogue
  become: yes
  tasks:
    - name: disable default nodejs version
      ansible.builtin.command: dnf module disable nodejs -y

    - name: enable nodejs 20 version
      ansible.builtin.command: dnf module enable nodejs:20 -y

    - name: install nodejs
      ansible.builtin.package:
        name: nodejs
        state: present

    - name: create application user
      ansible.builtin.user:
        name: roboshop
        system: yes
        home: /app
        shell: /sbin/nologin

    - name: create application directory
      ansible.builtin.file:
          path: /app
          state: directory

    - name: download catalogue code
      ansible.builtin.get_url:
        url: https://roboshop-artifacts.s3.amazonaws.com/catalogue-v3.zip
        dest: /tmp/catalogue.zip

    - name: unarchive catalogue code
      ansible.builtin.unarchive:
        src: /tmp/catalogue.zip
        dest: /app
        remote_src: yes

    - name: install dependencies
      community.general.npm:
        path: /app

    - name: update catalogue service configuration
      ansible.builtin.copy:
        src: catalogue.service
        dest: /etc/systemd/system/catalogue.service

    - name: daemon reload
      ansible.builtin.systemd:
        daemon_reload: yes

    - name : start catalogue service
      ansible.builtin.service:
        name: catalogue
        state: restarted
        enabled: yes

    - name: copy mongodb repo
      ansible.builtin.copy:
        src: mongodb.repo
        dest: /etc/yum.repos.d/mongodb.repo

    - name: install mongodb client
      ansible.builtin.package:
        name: mongodb-mongosh
        state: present

    - name: check products loaded or not
      ansible.builtin.command: mongosh --host mongodb.devopsjourney.online --eval 'db.getMongo().getDBNames().indexOf("catalogue")'
      register: catalogue_output

    - name: print catalogue output
      ansible.builtin.debug:
        msg: "{{ catalogue_output }}"

    - name: load catalogue data
      ansible.builtin.shell: mongosh --host mongodb.devopsjourney.online < /app/db/master-data.js
      when: catalogue_output.stdout | int < 0           # OR when: catalogue_output.stdout == "-1"